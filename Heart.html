<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I Love You</title>
<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

svg{
  width:400px;
  height:400px;
}

text{
  fill:#ff80b0;
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
  text-shadow:0 0 10px #fff, 0 0 20px #ff80b0;
}

.animateText{
  animation: moveText 8s linear infinite;
}

@keyframes moveText{
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
</style>
</head>
<body>

<svg viewBox="0 0 500 500">
  
  <path id="heartPath"
    d="M250 400 
       C 50 250, 50 100, 250 180
       C 450 100, 450 250, 250 400 Z"
    fill="none"/>

 
  <text>
    <textPath href="#heartPath" startOffset="0%">
      💗 I love you I love you I love you I love you I love you 💗
    </textPath>
  </text>
</svg>

<script>
const textPath = document.querySelector("textPath");
let offset = 0;

function animate(){
  offset += 0.2;   
  if(offset > 100) offset = 0;
  textPath.setAttribute("startOffset", offset + "%");
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
